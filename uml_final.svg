<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780">
  <defs>
    <style>
      .title { font: bold 22px Arial, sans-serif; fill: #1f2937; }
      .box-title { font: bold 16px Arial, sans-serif; fill: #111827; }
      .text { font: 13px Arial, sans-serif; fill: #374151; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .line { stroke: #334155; stroke-width: 2; fill: none; }
      .label { font: 12px Arial, sans-serif; fill: #0f172a; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <text x="30" y="38" class="title">PawPal+ Final UML (Class Diagram)</text>

  <rect x="40" y="80" width="330" height="250" class="box"/>
  <text x="55" y="108" class="box-title">Owner</text>
  <text x="55" y="132" class="text">- name: str</text>
  <text x="55" y="152" class="text">- email: str</text>
  <text x="55" y="172" class="text">- available_time_per_day: int</text>
  <text x="55" y="192" class="text">- preferences: Dict[str, Any]</text>
  <text x="55" y="212" class="text">- pets: List[Pet]</text>
  <text x="55" y="238" class="text">+ add_pet(pet: Pet)</text>
  <text x="55" y="258" class="text">+ get_pets() -&gt; List[Pet]</text>
  <text x="55" y="278" class="text">+ get_all_tasks() -&gt; List[Task]</text>
  <text x="55" y="298" class="text">+ set_preferences(prefs: Dict[str, Any])</text>

  <rect x="430" y="80" width="330" height="300" class="box"/>
  <text x="445" y="108" class="box-title">Pet</text>
  <text x="445" y="132" class="text">- name: str</text>
  <text x="445" y="152" class="text">- species: str</text>
  <text x="445" y="172" class="text">- age: int</text>
  <text x="445" y="192" class="text">- special_needs: List[str]</text>
  <text x="445" y="212" class="text">- tasks: List[Task]</text>
  <text x="445" y="238" class="text">+ add_task(task: Task)</text>
  <text x="445" y="258" class="text">+ get_tasks() -&gt; List[Task]</text>
  <text x="445" y="278" class="text">+ get_info() -&gt; Dict[str, Any]</text>

  <rect x="820" y="80" width="340" height="360" class="box"/>
  <text x="835" y="108" class="box-title">Task</text>
  <text x="835" y="132" class="text">- name: str</text>
  <text x="835" y="152" class="text">- description: str</text>
  <text x="835" y="172" class="text">- duration_minutes: int</text>
  <text x="835" y="192" class="text">- priority: int</text>
  <text x="835" y="212" class="text">- category: str</text>
  <text x="835" y="232" class="text">- frequency: str</text>
  <text x="835" y="252" class="text">- completed: bool</text>
  <text x="835" y="272" class="text">- scheduled_time: str</text>
  <text x="835" y="292" class="text">- due_date: date</text>
  <text x="835" y="318" class="text">+ get_priority_score() -&gt; int</text>
  <text x="835" y="338" class="text">+ get_datetime_key() -&gt; datetime</text>
  <text x="835" y="358" class="text">+ is_urgent() -&gt; bool</text>
  <text x="835" y="378" class="text">+ mark_complete()</text>

  <rect x="200" y="430" width="760" height="300" class="box"/>
  <text x="220" y="460" class="box-title">Scheduler</text>
  <text x="220" y="486" class="text">- owner: Owner</text>
  <text x="220" y="506" class="text">- pet: Pet</text>
  <text x="220" y="526" class="text">- available_time: int</text>
  <text x="220" y="546" class="text">- daily_schedule: List[Task]</text>
  <text x="220" y="572" class="text">+ generate_schedule() -&gt; List[Task]</text>
  <text x="220" y="592" class="text">+ prioritize_tasks(tasks) -&gt; List[Task]</text>
  <text x="220" y="612" class="text">+ sort_by_time(tasks?) -&gt; List[Task]</text>
  <text x="220" y="632" class="text">+ filter_tasks(tasks?, pet_name?, completed?) -&gt; List[Task]</text>
  <text x="220" y="652" class="text">+ detect_conflicts(tasks?) -&gt; List[str]</text>
  <text x="560" y="572" class="text">+ mark_task_complete(task_name, pet_name?) -&gt; Optional[Task]</text>
  <text x="560" y="592" class="text">+ assign_times(tasks) -&gt; Dict[str, Tuple[str, str]]</text>
  <text x="560" y="612" class="text">+ explain_plan(schedule) -&gt; str</text>
  <text x="560" y="632" class="text">- _find_pet(pet_name) -&gt; Optional[Pet]</text>
  <text x="560" y="652" class="text">- _create_recurring_follow_up(task, pet)</text>

  <line x1="370" y1="200" x2="430" y2="200" class="line" marker-end="url(#arrow)"/>
  <text x="382" y="188" class="label">1..* pets</text>

  <line x1="760" y1="230" x2="820" y2="230" class="line" marker-end="url(#arrow)"/>
  <text x="768" y="218" class="label">1..* tasks</text>

  <line x1="370" y1="300" x2="390" y2="430" class="line" marker-end="url(#arrow)"/>
  <text x="305" y="370" class="label">uses Owner</text>

  <line x1="560" y1="380" x2="560" y2="430" class="line" marker-end="url(#arrow)"/>
  <text x="572" y="408" class="label">uses Pet</text>

  <line x1="910" y1="440" x2="900" y2="430" class="line" marker-end="url(#arrow)"/>
  <text x="930" y="420" class="label">manipulates Task</text>
</svg>
